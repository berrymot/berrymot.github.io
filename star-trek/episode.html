<link href="../style.css" rel=stylesheet />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<h1>episode picker</h1>
<p>picks a random episode from whatever serieses you want.</p>
<p id=h></p>

<form>
  <fieldset>
    <legend>serieses</legend>
    <p>strikethroughed labels are series with seasons not fully released yet</p>
    <div class=list><div class=left>
      <input type=checkbox id=tos name=tos /> <label for=tos>tos</label> <br/>
      <input type=checkbox id=tas name=tas /> <label for=tas>tas</label> <br/>
      <input type=checkbox id=tng name=tng /> <label for=tng>tng</label> <br/>
      <input type=checkbox id=dsn name=dsn /> <label for=dsn>dsn</label> <br/>
      <input type=checkbox id=voy name=voy /> <label for=voy>voy</label> <br/>
      <input type=checkbox id=ent name=ent /> <label for=ent>ent</label> <br/>
      <input type=checkbox id=dis name=dis /> <label for=dis>dis</label> <br/>
      <input type=checkbox id=pic name=pic /> <label for=pic>pic</label> <br/>
      <input type=checkbox id=ld name=ld /> <label for=ld>ld</label> <br/>
      <input type=checkbox id=pro name=pro /> <label for=pro><del>pro</del></label> <br/>
      <input type=checkbox id=snw name=snw /> <label for=snw>snw</label> <br/>
      </div></div>
    <input type=submit value=do />
  </fieldset>
</form>

<script>
  let n = {
    "tos": [29, 26, 24],
    "tas": [16, 6],
    "tng": [25, 22, 26, 26, 26, 26, 25],
    "dsn": [19, 26, 26, 25, 26, 26, 25],
    "voy": [15, 26, 26, 26, 25, 26, 24],
    "ent": [25, 26, 24, 22],
    "dis": [15, 14, 13, 13],
    "pic": [10, 10],
    "ld":  [10, 10],
    "pro": [20],
    "snw": [10],
    "st":  [4, 6]
  };
  
  function q(v) { // src. css-tricks
    return decodeURIComponent(window.location.search.substring(1).split("&").map(function(p) { return p.split("=") }).filter(function(p) { return p[0] == v }).map(function(p) { return decodeURIComponent(p[1]) }).pop());
  }
  
  let selected = Object.keys(n).filter(v => q(v) == "on");
  let series = selected[Math.floor(Math.random() * selected.length)]; // picks a random one
  let season = Math.floor(Math.random() * n[series].length) + 1; // a random index of `n[series]`
  let episode = Math.floor(Math.random() * n[series][season - 1] ) + 1; // just pain 
  
  document.getElementById("h").textContent = "you should watch " + series + " s"+season + "e"+episode + ".";
</script>
