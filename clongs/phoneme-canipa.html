<link href="../style.css" rel=stylesheet />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<p><b id=the></b></p>
<p><a href=phoneme>ipa version</a></p>
<p>inspired by tracery</p>

<script>
  function s(a) {
    return a[Math.floor(Math.random() * a.length)];
  }
  
  // options
  let output = [s(voice) + " " + s(place) + " " + s(manner), s(height) + " " + s(backness) + " " + s(roundness) + " vowel"];
  let voice = ["voiced", "voiceless", s(prefix) + s(voice)];
  let place = ["labial", "dental", "alveolar", "palatal", "velar", "uvular", "pharyngeal", "laryngeal", "apical", "laminal", s(prefix) + s(place), s(place) + "-" + s(place), s(ized) + s(place)];
  let manner = ["nasal", "stop", s(strictive) + "strictive", "approximant", "trill", "tap", "flap", "lateral", s(prefix) + s(manner), s(manner) + " " + s(manner), s(ized) + s(manner)];
  let prefix = ["labio", "dento", "alveo", "palato", "velo", "uvulo", "apico", "lamino", "semi", "demi", "uni", "bi", "pre", "pro", "back", "post", s(prefix) + s(prefix)];
  let strictive = ["con", "stop", "trill", "lateral", s(prefix)];
  let ized = [s(place) + "ized ", "nasalized ", "lateralized "];
  let height = ["high", "low", "mid", s(["high", "low"]) + "er-" + s(height)];
  let backness = ["front", "central", "back", s(backness) + "-" + s(backness)];
  let roundness = ["rounded", "unrounded", s(prefix) + s(roundness)];
  
  document.getElementById("the").textContent = s(output);
</script>
