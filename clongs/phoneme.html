<p><b id=the></b></p>
<p>sounds painful</p>
<p>canipa version coming soon?</p>

<script>
  let voicings = ["voiced", "voiceless"];
  let places = ["labial", "frenular", "coronal", "dental", "alveolar", "flex", "dorsal", "palatal", "velar", "uvular", "laryngeal", "pharyngeal", "epiglottal", "glottal"];
  let manners = ["nasal", "stop", "plosive", "affricate", "fricative", "vowel", "approximant", "trill", "tap", "flap", "rhotic", "liquid", "strident", "sibilant", "sonorant", "continuant", "lateral", "vibrant", "implosive", "click", "ejective", "melon"];
  let prefixes = ["semi", "bi", "tri", "labio", "linguo", "corono", "dento", "alveo", "retro", "dorso", "palato", "velo", "uvulo", "glotto", "naso", "latero", "pre", "post", "apico", "lamino", "sub", "super", "medio", "", "", "", ""];
  
  function random(a) {
    return a[Math.floor(Math.random() * a.length)];
  }
  function prefix() {
    var s = "";
    let n = Math.floor(Math.random() * 4);
    for (var i = 0; i < n; i++) {
      s += random(prefixes) + "-";
    }
    return s;
  }
  
  document.getElementById("the").textContent = random(voicings) + " " + prefix() + random(places) + " " + prefix() + random(manners);
</script>
