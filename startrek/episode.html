<h1>episode picker</h1>
<p>picks a random episode from whatever serieses you want.</p>
<p>you should watch ...</p>

<form>
  <fieldset>
    <legend>serieses</legend>
    <input type=checkbox id=tos name=tos /> <label for=tos>tos</label>
    <input type=checkbox id=tas name=tas /> <label for=tas>tas</label>
    <input type=checkbox id=tng name=tng checked /> <label for=tng>tng</label>
    <input type=checkbox id=dsn name=dsn checked /> <label for=dsn>dsn</label>
    <input type=checkbox id=voy name=voy checked /> <label for=voy>voyager</label>
    <input type=checkbox id=ent name=ent /> <label for=ent>enterprise</label>
    <input type=checkbox id=dis name=dis /> <label for=dis>discovery</label>
    <input type=checkbox id=pic name=pic /> <label for=pic>picard</label>
    <input type=checkbox id=ld name=ld /> <label for=ld>lower decks</label>
    <input type=checkbox id=pro name=pro /> <label for=pro>prodigy</label>
    <input type=checkbox id=snw name=snw /> <label for=snw>snw</label>
    <input type=checkbox id=st name=st /> <label for=st>short treks</label>
  </fieldset>
</form>
