<link href="../style.css" rel=stylesheet />

<h1>episode picker</h1>
<p>picks a random episode from whatever serieses you want.</p>
<output id=h></output>

<form>
  <fieldset>
    <legend>serieses</legend>
    <input type=checkbox id=tos name=tos checked /> <label for=tos>tos</label> <br/>
    <input type=checkbox id=tas name=tas checked /> <label for=tas>tas</label> <br/>
    <input type=checkbox id=tng name=tng checked /> <label for=tng>tng</label> <br/>
    <input type=checkbox id=dsn name=dsn checked /> <label for=dsn>dsn</label> <br/>
    <input type=checkbox id=voy name=voy checked /> <label for=voy>voyager</label> <br/>
    <input type=checkbox id=ent name=ent checked /> <label for=ent>enterprise</label> <br/>
    <input type=checkbox id=dis name=dis checked /> <label for=dis>discovery</label> <br/>
    <input type=checkbox id=pic name=pic checked /> <label for=pic>picard</label> <br/>
    <input type=checkbox id=ld name=ld checked /> <label for=ld>lower decks</label> <br/>
    <input type=checkbox id=pro name=pro checked /> <label for=pro>prodigy</label> <br/>
    <input type=checkbox id=snw name=snw checked /> <label for=snw>snw</label> <br/>
    <input type=checkbox id=st name=st checked /> <label for=st>short treks</label> <br/>
    <input type=submit value=do />
  </fieldset>
</form>

<script>
  let n = {
    "tos": [29, 26, 24],
    "tas": [16, 6],
    "tng": [25, 22, 26, 26, 26, 26, 25],
    "dsn": [19, 26, 26, 25, 26, 26, 25],
    "voy": [15, 26, 26, 26, 25, 26, 24],
    "ent": [25, 26, 24, 22],
    "dis": [15, 14, 13, 13],
    "pic": [10, 10],
    "ld":  [10, 10],
    "pro": [20],
    "snw": [10],
    "st":  [4, 6]
  };
  
  function q(v) { // src. css-tricks
    return decodeURIComponent(window.location.search.substring(1).split("&").map(function(p) { return p.split("=") }).filter(function(p) { return p[0] == v }).map(function(p) { return decodeURIComponent(p[1]) }).pop());
  }
  
  let all = ["tos", "tas", "tng", "dsn", "voy", "ent", "dis", "pic", "ld", "pro", "snw", "st"];
  var selected;
  
  for (var i = 0; i < all.length; i++) {
    if (q(all[i]) == "on") {
      selected.push(all[i]); // adds selected series to list
    }
    let series = selected[Math.floor(Math.random() * selected.length)]; // picks a random one
    let season = Math.floor(Math.random() * series.length) + 1; // a random index of `n[series]`
    let episode = Math.floor(Math.random() * (n[series - 1][season] - 1)) + 1; // just pain
    
    document.getElementById("h").textContent = "you should watch " + series + "s"+season + "e"+episode + ".";
</script>
